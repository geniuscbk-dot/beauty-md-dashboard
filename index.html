<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping A.I.</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#faf9f7;color:#1c1916;font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.5;}
header{background:#fff;border-bottom:1px solid #e8e3db;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;}
.logo-en{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#b07240;}
.logo-by{font-size:11px;color:#9a9088;margin-left:8px;}
.live-badge{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:#3a7d52;background:#eaf3ec;padding:3px 9px;border-radius:20px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:#3a7d52;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.cat-bar{background:#fff;border-bottom:1px solid #e8e3db;padding:0 16px;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-tab{padding:10px 13px;font-size:13px;font-weight:500;color:#9a9088;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .18s;flex-shrink:0;}
.cat-tab.active{color:#b07240;border-bottom-color:#b07240;font-weight:700;}
.kpi-strip{background:#b07240;padding:8px 16px;display:flex;gap:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.kpi-strip::-webkit-scrollbar{display:none;}
.kpi-item{display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;}
.kpi-label{font-size:10px;color:rgba(255,255,255,.75);}
.kpi-val{font-size:11px;font-weight:700;color:#fff;}
.kpi-div{width:1px;height:12px;background:rgba(255,255,255,.25);flex-shrink:0;}
.section{padding:14px 16px;}
.section-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9a9088;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;}
.section-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.badge-live{background:#eaf3ec;color:#3a7d52;}
.badge-time{background:#f5f3ef;color:#9a9088;border:1px solid #d6cfc4;}
.shop-list{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #e8e3db;}
.shop-item{border-bottom:1px solid #e8e3db;}
.shop-item:last-child{border-bottom:none;}
.shop-row{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none;transition:background .15s;}
.shop-row:active{background:#f5f3ef;}
.shop-row.open{background:#f7ede0;}
.shop-no{font-family:'Cormorant Garamond',serif;font-size:17px;width:20px;text-align:center;color:#d6cfc4;flex-shrink:0;font-weight:600;}
.shop-no.gold{color:#c9973a;}.shop-no.silver{color:#909090;}.shop-no.bronze{color:#a07050;}
.shop-info{flex:1;min-width:0;}
.shop-brand{font-size:10px;color:#9a9088;margin-bottom:2px;}
.shop-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.shop-right{text-align:right;flex-shrink:0;}
.shop-price{font-size:13px;font-weight:700;color:#b07240;}
.shop-link{font-size:10px;color:#9a9088;margin-top:2px;}
.shop-chevron{font-size:11px;color:#9a9088;flex-shrink:0;transition:transform .2s;}
.shop-row.open .shop-chevron{transform:rotate(180deg);}

/* AI 패널 */
.ai-panel{display:none;padding:14px 16px;background:#f5f3ef;border-top:1px solid #e8e3db;}
.ai-panel.open{display:block;animation:slideDown .2s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.ai-label{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#b07240;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.ai-text{font-size:13px;line-height:1.7;color:#4a4540;white-space:pre-wrap;}
.ai-loading{display:flex;align-items:center;gap:8px;color:#9a9088;font-size:12px;}
.ai-spinner{width:14px;height:14px;border:2px solid #e8e3db;border-top-color:#b07240;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
.ai-link{display:inline-block;margin-top:10px;font-size:11px;color:#3a7d52;text-decoration:none;font-weight:600;}

.loading-wrap{display:flex;align-items:center;justify-content:center;padding:28px;gap:10px;color:#9a9088;font-size:13px;}
.spinner{width:18px;height:18px;border:2px solid #e8e3db;border-top-color:#b07240;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:8px;background:#f5f3ef;}
.bottom-pad{height:40px;}
</style>

</head>
<body>

<header>
  <div><span class="logo-en">Shopping A.I.</span><span class="logo-by">by 조병근</span></div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
</header>

<div class="cat-bar">
  <div class="cat-tab active" onclick="switchCat(this,'fashion')">👗 패션</div>
  <div class="cat-tab" onclick="switchCat(this,'electronics')">📱 전자기기</div>
  <div class="cat-tab" onclick="switchCat(this,'kitchen')">🍳 주방</div>
  <div class="cat-tab" onclick="switchCat(this,'living')">🏠 리빙</div>
  <div class="cat-tab" onclick="switchCat(this,'beauty')">💄 뷰티</div>
  <div class="cat-tab" onclick="switchCat(this,'food')">🍎 식품</div>
</div>

<div class="kpi-strip">
  <div class="kpi-item"><span class="kpi-label">카테고리</span><span class="kpi-val">6개</span></div>
  <div class="kpi-div"></div>
  <div class="kpi-item"><span class="kpi-label">모니터링</span><span class="kpi-val">60개 상품</span></div>
  <div class="kpi-div"></div>
  <div class="kpi-item"><span class="kpi-label">업데이트</span><span class="kpi-val" id="kpiTime">—</span></div>
</div>

<div class="section">
  <div class="section-title">
    🏆 네이버 쇼핑 TOP 10
    <span class="section-badge badge-time" id="shopTimeLabel">—</span>
  </div>
  <div class="shop-list" id="shopList">
    <div class="loading-wrap"><div class="spinner"></div>불러오는 중...</div>
  </div>
</div>

<div class="bottom-pad"></div>

<script>
const WORKER_URL = "https://shopping-ai.byungkuen.workers.dev";
let currentCat = 'fashion';
let analyzing = {};

function fmtNow(){
  const n=new Date();
  return `${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')} 기준`;
}

function switchCat(el, cat){
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentCat = cat;
  analyzing = {};
  loadShopping();
}

async function loadShopping(){
  const list = document.getElementById('shopList');
  const timeLabel = document.getElementById('shopTimeLabel');
  const kpiTime = document.getElementById('kpiTime');
  list.innerHTML = '<div class="loading-wrap"><div class="spinner"></div>불러오는 중...</div>';
  const now = fmtNow();
  timeLabel.textContent = now;
  kpiTime.textContent = now;
  try {
    const res = await fetch(`${WORKER_URL}/?type=shopping&category=${currentCat}`);
    const data = await res.json();
    if(data.error || !data.items || !data.items.length){
      list.innerHTML = '<div style="color:#b84040;padding:20px;font-size:12px;text-align:center">⚠️ 데이터를 불러올 수 없습니다</div>';
      return;
    }
    renderShopping(data.items);
  } catch(e){
    list.innerHTML = '<div style="color:#b84040;padding:20px;font-size:12px;text-align:center">⚠️ 연결 오류</div>';
  }
}

function renderShopping(items){
  const medals = ['gold','silver','bronze'];
  document.getElementById('shopList').innerHTML = items.map((p,i) => `
    <div class="shop-item" id="sitem-${i}">
      <div class="shop-row" onclick="toggleAI(${i}, '${p.name.replace(/'/g,"\\'")}', '${p.link}')">
        <div class="shop-no ${medals[i]||''}">${i+1}</div>
        <div class="shop-info">
          <div class="shop-brand">${p.brand}</div>
          <div class="shop-name">${p.name}</div>
        </div>
        <div class="shop-right">
          <div class="shop-price">${p.price}</div>
          <div class="shop-link">🔗 네이버쇼핑</div>
        </div>
        <div class="shop-chevron">▼</div>
      </div>
      <div class="ai-panel" id="ai-${i}">
        <div class="ai-label">🤖 A.I. 분석</div>
        <div class="ai-text" id="ai-text-${i}"></div>
        <a class="ai-link" href="${p.link}" target="_blank">→ 네이버쇼핑에서 보기</a>
      </div>
    </div>`).join('');
}

async function toggleAI(idx, name, link){
  const row = document.querySelector(`#sitem-${idx} .shop-row`);
  const panel = document.getElementById(`ai-${idx}`);
  const textEl = document.getElementById(`ai-text-${idx}`);
  const isOpen = panel.classList.contains('open');

  document.querySelectorAll('.shop-row').forEach(r=>r.classList.remove('open'));
  document.querySelectorAll('.ai-panel').forEach(p=>p.classList.remove('open'));

  if(!isOpen){
    row.classList.add('open');
    panel.classList.add('open');

    if(analyzing[idx]){
      return;
    }

    if(textEl.textContent && textEl.textContent.length > 10){
      return;
    }

    analyzing[idx] = true;
    textEl.innerHTML = '<div class="ai-loading"><div class="ai-spinner"></div>AI가 분석 중입니다...</div>';

    try {
      const res = await fetch(`${WORKER_URL}/?type=analyze&product=${encodeURIComponent(name)}`);
      const data = await res.json();
      textEl.textContent = data.analysis || '분석 실패';
    } catch(e){
      textEl.textContent = '분석 중 오류가 발생했습니다.';
    }
    analyzing[idx] = false;
  }
}

loadShopping();
</script>

</body>
</html>
