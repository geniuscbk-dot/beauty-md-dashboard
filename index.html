<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty A.I.</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#faf9f7; --surface:#fff; --surface2:#f5f3ef;
    --border:#e8e3db; --border2:#d6cfc4;
    --accent:#b07240; --accent-soft:#f7ede0;
    --text:#1c1916; --text2:#4a4540; --muted:#9a9088;
    --up:#3a7d52; --up-soft:#eaf3ec;
    --down:#b84040; --down-soft:#faeaea;
    --gold:#c9973a;
    --shadow:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.5;}

/* HEADER */
header{background:var(–surface);border-bottom:1px solid var(–border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;}
.logo-en{font-family:‘Cormorant Garamond’,serif;font-size:20px;font-weight:600;color:var(–accent);}
.logo-by{font-size:11px;color:var(–muted);margin-left:8px;}
.live-badge{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(–up);background:var(–up-soft);padding:3px 9px;border-radius:20px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(–up);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

/* CAT + DATE BAR */
.top-bar{background:var(–surface);border-bottom:1px solid var(–border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;}
.cat-nav{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1;}
.cat-nav::-webkit-scrollbar{display:none;}
.cat-tab{padding:10px 13px;font-size:13px;font-weight:500;color:var(–muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .18s;flex-shrink:0;}
.cat-tab:hover{color:var(–text);}
.cat-tab.active{color:var(–accent);border-bottom-color:var(–accent);font-weight:700;}

/* 날짜 드롭다운 */
.date-select-wrap{flex-shrink:0;padding-left:12px;border-left:1px solid var(–border);}
.date-select{border:1px solid var(–border2);border-radius:6px;padding:4px 8px;font-size:12px;font-weight:600;font-family:‘Noto Sans KR’,sans-serif;color:var(–accent);background:var(–accent-soft);outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;padding-right:20px;}
.date-select-wrap{position:relative;}
.date-select-wrap::after{content:‘▼’;font-size:8px;color:var(–accent);position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;}

/* KPI STRIP */
.kpi-strip{background:var(–accent);padding:8px 20px;display:flex;gap:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.kpi-strip::-webkit-scrollbar{display:none;}
.kpi-item{display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0;}
.kpi-label{font-size:11px;color:rgba(255,255,255,.75);}
.kpi-val{font-size:12px;font-weight:700;color:#fff;}
.kpi-div{width:1px;height:12px;background:rgba(255,255,255,.25);flex-shrink:0;}

/* SECTION */
.section{padding:16px 20px;}
.section-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(–muted);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.section-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.badge-live{background:var(–up-soft);color:var(–up);}
.badge-rt{background:var(–accent-soft);color:var(–accent);}
.badge-time{background:var(–surface2);color:var(–muted);border:1px solid var(–border2);}

/* RANK LIST */
.rank-list{background:var(–surface);border-radius:12px;overflow:hidden;box-shadow:var(–shadow);border:1px solid var(–border);}
.rank-item{border-bottom:1px solid var(–border);}
.rank-item:last-child{border-bottom:none;}
.rank-row{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .15s;user-select:none;}
.rank-row:active{background:var(–surface2);}
.rank-row.open{background:var(–accent-soft);}
.rk-no{font-family:‘Cormorant Garamond’,serif;font-size:18px;width:22px;text-align:center;color:var(–border2);flex-shrink:0;font-weight:600;}
.rk-no.gold{color:var(–gold);}.rk-no.silver{color:#909090;}.rk-no.bronze{color:#a07050;}
.rk-info{flex:1;min-width:0;}
.rk-brand{font-size:10px;color:var(–muted);margin-bottom:2px;display:flex;align-items:center;gap:5px;}
.rk-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rk-right{text-align:right;flex-shrink:0;}
.rk-price{font-size:13px;font-weight:700;}
.rk-unit{font-size:10px;color:var(–muted);margin-top:1px;}
.rk-chevron{font-size:12px;color:var(–muted);flex-shrink:0;transition:transform .2s;}
.rank-row.open .rk-chevron{transform:rotate(180deg);}

/* INSIGHT */
.insight-panel{display:none;padding:14px 16px;background:var(–surface2);border-top:1px solid var(–border);}
.insight-panel.open{display:block;animation:slideDown .2s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.insight-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(–accent);margin-bottom:8px;}
.sentiment-bar{display:flex;height:4px;border-radius:3px;overflow:hidden;margin-bottom:6px;}
.sb-pos{background:var(–up);}.sb-neg{background:var(–down);}.sb-neu{background:var(–border2);}
.sentiment-row{display:flex;gap:12px;margin-bottom:10px;}
.sl-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(–muted);}
.sl-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.rv-blocks{display:flex;flex-direction:column;gap:6px;}
.rv-block{padding:8px 10px;border-radius:6px;border-left:3px solid var(–border2);background:var(–surface);}
.rv-block.pos{border-left-color:var(–up);}.rv-block.neg{border-left-color:var(–down);}
.rv-tag{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
.rv-block.pos .rv-tag{color:var(–up);}.rv-block.neg .rv-tag{color:var(–down);}.rv-block .rv-tag{color:var(–muted);}
.rv-text{font-size:12px;line-height:1.6;color:var(–text2);}

.badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;}
.b-hot{background:#fff0e0;color:var(–accent);}.b-new{background:#e8f0fe;color:#3a6fd8;}.b-up{background:var(–up-soft);color:var(–up);}

/* PRICE CARD */
.price-card{background:var(–surface);border-radius:12px;overflow:hidden;box-shadow:var(–shadow);border:1px solid var(–border);}
.price-item{padding:12px 16px;border-bottom:1px solid var(–border);}
.price-item:last-child{border-bottom:none;}
.price-item-name{font-size:13px;font-weight:600;margin-bottom:1px;}
.price-item-sub{font-size:10px;color:var(–muted);margin-bottom:8px;}
.price-channels{display:flex;gap:6px;margin-bottom:8px;}
.price-ch{display:flex;flex-direction:column;align-items:center;background:var(–surface2);border-radius:8px;padding:7px 6px;flex:1;border:1px solid var(–border);text-decoration:none;color:inherit;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.price-ch:active{opacity:.7;transform:scale(.97);}
.price-ch.best{background:var(–up-soft);border-color:#a8d5b8;}
.price-ch-label{font-size:9px;color:var(–muted);margin-bottom:2px;font-weight:700;letter-spacing:.03em;}
.price-ch.best .price-ch-label{color:var(–up);}
.price-ch-val{font-size:12px;font-weight:700;margin-bottom:2px;}
.price-ch.best .price-ch-val{color:var(–up);}
.price-ch-unit{font-size:9px;color:var(–muted);margin-bottom:2px;}
.price-ch.best .price-ch-unit{color:var(–up);opacity:.8;}
.price-ch-link{font-size:9px;color:var(–muted);}
.price-ch.best .price-ch-link{color:var(–up);}
.price-meta{display:flex;align-items:center;gap:8px;}
.gap-chip{font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;}
.gap-dn{background:var(–down-soft);color:var(–down);}.gap-up{background:var(–up-soft);color:var(–up);}

/* KEYWORD */
.kw-card{background:var(–surface);border-radius:12px;overflow:hidden;box-shadow:var(–shadow);border:1px solid var(–border);}
.kw-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(–border);}
.kw-item:last-child{border-bottom:none;}
.kw-no{font-size:11px;font-weight:700;width:16px;text-align:center;color:var(–muted);flex-shrink:0;}
.kw-no.hot{color:var(–accent);}
.kw-word{flex:1;font-size:14px;font-weight:500;}
.kw-bar-wrap{width:44px;height:3px;background:var(–border);border-radius:2px;overflow:hidden;flex-shrink:0;}
.kw-bar-fill{height:100%;background:linear-gradient(90deg,var(–accent),#d4956a);border-radius:2px;}
.kw-pct{font-size:11px;font-weight:700;width:48px;text-align:right;flex-shrink:0;}
.c-up{color:var(–up);}.c-dn{color:var(–down);}.c-flat{color:var(–muted);}

.loading-wrap{display:flex;align-items:center;justify-content:center;padding:32px;gap:10px;color:var(–muted);font-size:13px;}
.spinner{width:18px;height:18px;border:2px solid var(–border);border-top-color:var(–accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.divider{height:8px;background:var(–surface2);}
.bottom-pad{height:40px;}
.kw-legend{font-size:11px;color:var(–muted);padding:0 0 8px 2px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.kw-legend span{display:flex;align-items:center;gap:3px;}
.kw-legend .up{color:var(–up);font-weight:700;}
.kw-legend .dn{color:var(–down);font-weight:700;}
.kw-legend .flat{color:var(–muted);font-weight:700;}
</style>

</head>
<body>

<header>
  <div><span class="logo-en">Beauty A.I.</span><span class="logo-by">by 조병근</span></div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
</header>

<!-- 카테고리 + 날짜 선택 -->

<div class="top-bar">
  <nav class="cat-nav">
    <div class="cat-tab active" onclick="switchCat(this,'skincare')">🌿 스킨케어</div>
    <div class="cat-tab" onclick="switchCat(this,'mask')">🧖 마스크팩</div>
    <div class="cat-tab" onclick="switchCat(this,'suncare')">☀️ 선케어</div>
    <div class="cat-tab" onclick="switchCat(this,'cleansing')">🧴 클렌징</div>
    <div class="cat-tab" onclick="switchCat(this,'makeup')">💄 메이크업</div>
  </nav>
  <div class="date-select-wrap">
    <select class="date-select" id="weekSelect" onchange="onWeekChange()">
      <option value="1" selected>최근 1주</option>
      <option value="2">최근 2주</option>
      <option value="4">최근 4주</option>
      <option value="8">최근 8주</option>
      <option value="12">최근 12주</option>
    </select>
  </div>
</div>

<div class="kpi-strip">
  <div class="kpi-item"><span class="kpi-label">모니터링</span><span class="kpi-val">247개</span></div>
  <div class="kpi-div"></div>
  <div class="kpi-item"><span class="kpi-label">급등 키워드</span><span class="kpi-val" id="kpiHot">—</span></div>
  <div class="kpi-div"></div>
  <div class="kpi-item"><span class="kpi-label">OLY vs 최저가</span><span class="kpi-val">평균 -21%</span></div>
  <div class="kpi-div"></div>
  <div class="kpi-item"><span class="kpi-label">조회 기간</span><span class="kpi-val" id="kpiDate">—</span></div>
</div>

<!-- 랭킹 -->

<div class="section">
  <div class="section-title">
    🏆 올리브영 TOP 10
    <span class="section-badge badge-live">실시간</span>
  </div>
  <div class="rank-list" id="rankList"></div>
</div>

<div class="divider"></div>

<!-- 가격 비교 -->

<div class="section">
  <div class="section-title">
    💰 채널별 가격 비교
    <span class="section-badge badge-time" id="priceTimeLabel">—</span>
  </div>
  <div class="price-card" id="priceList"></div>
</div>

<div class="divider"></div>

<!-- 키워드 -->

<div class="section">
  <div class="section-title">
    📈 네이버 트렌드 키워드
    <span class="section-badge badge-live" id="kwBadge">실시간</span>
  </div>
  <div class="kw-legend">
    <span><span class="up">▲</span> 검색량 증가</span>
    <span style="color:var(--border2)">·</span>
    <span><span class="dn">▼</span> 검색량 감소</span>
    <span style="color:var(--border2)">·</span>
    <span><span class="flat">→</span> 변화없음</span>
  </div>
  <div class="kw-card" id="kwList">
    <div class="loading-wrap"><div class="spinner"></div>불러오는 중...</div>
  </div>
</div>

<div class="bottom-pad"></div>

<script>
const WORKER_URL = "https://beauty-md-dashboard.byungkuen.workers.dev";
let currentCat = 'skincare';
let currentWeeks = 1;

// ─── 날짜 유틸 ───────────────────────
function getToday(){ return new Date().toISOString().split('T')[0]; }
function getPrior(days){ const d=new Date(); d.setDate(d.getDate()-days); return d.toISOString().split('T')[0]; }

function fmtShort(dateStr){
  const d=new Date(dateStr);
  const yy=String(d.getFullYear()).slice(2);
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  return `${yy}.${mm}.${dd}`;
}

function fmtKor(dateStr){
  const d=new Date(dateStr);
  return `${d.getMonth()+1}월 ${d.getDate()}일`;
}

function fmtNow(){
  const now=new Date();
  const m=String(now.getMonth()+1).padStart(2,'0');
  const d=String(now.getDate()).padStart(2,'0');
  const h=String(now.getHours()).padStart(2,'0');
  const mi=String(now.getMinutes()).padStart(2,'0');
  return `${m}/${d} ${h}:${mi} 기준`;
}

function getWeekLabel(weeks){
  const days=weeks*7;
  const start=getPrior(days), end=getToday();
  return `최근 ${weeks}주 (${fmtShort(start)}~${fmtShort(end)})`;
}

function updateSelectOptions(){
  const sel=document.getElementById('weekSelect');
  [1,2,4,8,12].forEach(w=>{
    const days=w*7;
    const start=getPrior(days), end=getToday();
    const opt=sel.querySelector(`option[value="${w}"]`);
    if(opt) opt.textContent=`최근 ${w}주 (${fmtShort(start)}~${fmtShort(end)})`;
  });
}

function updateKpiDate(){
  const days=currentWeeks*7;
  const start=getPrior(days), end=getToday();
  document.getElementById('kpiDate').textContent=`${fmtShort(start)} ~ ${fmtShort(end)}`;
}

// ─── 이벤트 ───────────────────────────
function onWeekChange(){
  currentWeeks = parseInt(document.getElementById('weekSelect').value);
  updateKpiDate();
  loadKeywords();
}

function switchCat(el, cat){
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentCat=cat;
  renderRanking(DATA[cat].ranking);
  renderPrices(DATA[cat].prices);
  loadKeywords();
}

// ─── 랭킹 렌더링 ──────────────────────
function renderRanking(items){
  const medals=['gold','silver','bronze'];
  const bm={
    hot:'<span class="badge b-hot">🔥 HOT</span>',
    new:'<span class="badge b-new">✨ NEW</span>',
    up:'<span class="badge b-up">▲ UP</span>'
  };
  document.getElementById('rankList').innerHTML=items.map((p,i)=>`
    <div class="rank-item" id="item-${i}">
      <div class="rank-row" onclick="toggleInsight(${i})">
        <div class="rk-no ${medals[i]||''}">${i+1}</div>
        <div class="rk-info">
          <div class="rk-brand">${p.brand} ${bm[p.badge]||''}</div>
          <div class="rk-name">${p.name}</div>
        </div>
        <div class="rk-right">
          <div class="rk-price">${p.price}</div>
          <div class="rk-unit">${p.unit}</div>
        </div>
        <div class="rk-chevron">▼</div>
      </div>
      <div class="insight-panel" id="insight-${i}">
        <div class="insight-label">💬 AI 리뷰 인사이트 — ${p.brand}</div>
        <div class="sentiment-bar">
          <div class="sb-pos" style="width:${p.pos}%"></div>
          <div class="sb-neg" style="width:${p.neg}%"></div>
          <div class="sb-neu" style="width:${p.neu}%"></div>
        </div>
        <div class="sentiment-row">
          <div class="sl-item"><div class="sl-dot" style="background:var(--up)"></div>긍정 ${p.pos}%</div>
          <div class="sl-item"><div class="sl-dot" style="background:var(--down)"></div>부정 ${p.neg}%</div>
          <div class="sl-item"><div class="sl-dot" style="background:var(--border2)"></div>중립 ${p.neu}%</div>
        </div>
        <div class="rv-blocks">
          <div class="rv-block pos"><div class="rv-tag">✅ 긍정</div><div class="rv-text">${p.posText}</div></div>
          <div class="rv-block neg"><div class="rv-tag">❌ 부정</div><div class="rv-text">${p.negText}</div></div>
          <div class="rv-block"><div class="rv-tag">➡️ 중립</div><div class="rv-text">${p.neuText}</div></div>
        </div>
      </div>
    </div>`).join('');
}

function toggleInsight(idx){
  const row=document.querySelector(`#item-${idx} .rank-row`);
  const panel=document.getElementById(`insight-${idx}`);
  const isOpen=panel.classList.contains('open');
  document.querySelectorAll('.rank-row').forEach(r=>r.classList.remove('open'));
  document.querySelectorAll('.insight-panel').forEach(p=>p.classList.remove('open'));
  if(!isOpen){ row.classList.add('open'); panel.classList.add('open'); }
}

// ─── 가격 렌더링 ──────────────────────
function calcUnit(priceStr, vol, unit){
  if(!vol || vol === '—') return '—';
  const price = parseInt(priceStr.replace(/,/g,''));
  const num = parseFloat(vol);
  if(isNaN(num) || num === 0) return '—';
  const perUnit = Math.round(price / num);
  return `${perUnit.toLocaleString()}원/${unit}`;
}

function olyURL(name){ return `https://www.oliveyoung.co.kr/store/search/getSearchMain.do?query=${encodeURIComponent(name)}`; }
function coupURL(name){ return `https://www.coupang.com/np/search?q=${encodeURIComponent(name)}`; }
function naverURL(name){ return `https://search.shopping.naver.com/search/all?query=${encodeURIComponent(name)}`; }

function renderPrices(prices){
  document.getElementById('priceTimeLabel').textContent = fmtNow();
  document.getElementById('priceList').innerHTML=prices.map(p=>{
    const nums=[p.oly,p.coup,p.naver].map(v=>parseInt(v.replace(/,/g,'')));
    const min=Math.min(...nums);
    const isBest=v=>parseInt(v.replace(/,/g,''))===min;
    const sn=p.searchName||p.name;

    const olyUnit = calcUnit(p.oly, p.volNum, p.volUnit);
    const coupUnit = calcUnit(p.coup, p.volNum, p.volUnit);
    const naverUnit = calcUnit(p.naver, p.volNum, p.volUnit);

    return `
      <div class="price-item">
        <div class="price-item-name">${p.name}</div>
        <div class="price-item-sub">${p.sub}</div>
        <div class="price-channels">
          <a class="price-ch ${isBest(p.oly)?'best':''}" href="${olyURL(sn)}" target="_blank">
            <span class="price-ch-label">올리브영</span>
            <span class="price-ch-val">${p.oly}</span>
            <span class="price-ch-unit">${olyUnit}</span>
            <span class="price-ch-link">🔗 검색</span>
          </a>
          <a class="price-ch ${isBest(p.coup)?'best':''}" href="${coupURL(sn)}" target="_blank">
            <span class="price-ch-label">쿠팡</span>
            <span class="price-ch-val">${p.coup}</span>
            <span class="price-ch-unit">${coupUnit}</span>
            <span class="price-ch-link">🔗 검색</span>
          </a>
          <a class="price-ch ${isBest(p.naver)?'best':''}" href="${naverURL(sn)}" target="_blank">
            <span class="price-ch-label">네이버</span>
            <span class="price-ch-val">${p.naver}</span>
            <span class="price-ch-unit">${naverUnit}</span>
            <span class="price-ch-link">🔗 검색</span>
          </a>
        </div>
        <div class="price-meta">
          <span class="gap-chip gap-${p.gapDir}">OLY 최저가 대비 ${p.gap}</span>
        </div>
      </div>`;
  }).join('');
}

// ─── 키워드 API ───────────────────────
async function loadKeywords(){
  const list=document.getElementById('kwList');
  const badge=document.getElementById('kwBadge');
  list.innerHTML='<div class="loading-wrap"><div class="spinner"></div>불러오는 중...</div>';

  const days=currentWeeks*7;
  const start=getPrior(days), end=getToday();
  const startStr=fmtShort(start), endStr=fmtShort(end);

  try{
    const res=await fetch(`${WORKER_URL}/?category=${currentCat}&startDate=${start}&endDate=${end}&timeUnit=week`);
    const data=await res.json();
    if(data.error){
      list.innerHTML=`<div style="color:var(--down);padding:20px;font-size:12px;text-align:center">⚠️ ${data.error}</div>`;
      badge.textContent='오류';
      return;
    }
    renderKeywords(data.keywords);
    const cnt=data.keywords.filter(k=>k.dir==='up').length;
    document.getElementById('kpiHot').textContent=`${cnt}개 ▲`;
    badge.textContent=`실시간 · ${startStr}~${endStr}`;
  }catch(e){
    renderKeywords(DATA[currentCat].sampleKeywords);
    badge.textContent=`샘플 · ${startStr}~${endStr}`;
    const cnt=DATA[currentCat].sampleKeywords.filter(k=>k.dir==='up').length;
    document.getElementById('kpiHot').textContent=`${cnt}개 ▲`;
  }
}

function renderKeywords(kws){
  if(!kws||!kws.length){
    document.getElementById('kwList').innerHTML='<div style="color:var(--muted);padding:20px;text-align:center">데이터 없음</div>';
    return;
  }
  // 최대 10개
  const list = kws.slice(0,10);
  const maxR=Math.max(...list.map(k=>k.ratio));
  document.getElementById('kwList').innerHTML=list.map((k,i)=>{
    const barW=maxR>0?Math.round(k.ratio/maxR*100):0;
    const pctStr=k.dir==='up'?`▲${k.pct}%`:k.dir==='dn'?`▼${Math.abs(k.pct)}%`:'→ 0%';
    const pctCls=k.dir==='up'?'c-up':k.dir==='dn'?'c-dn':'c-flat';
    return `<div class="kw-item">
      <span class="kw-no ${i<3?'hot':''}">${i+1}</span>
      <span class="kw-word">${k.word}</span>
      <div class="kw-bar-wrap"><div class="kw-bar-fill" style="width:${barW}%"></div></div>
      <span class="kw-pct ${pctCls}">${pctStr}</span>
    </div>`;
  }).join('');
}
