<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty MD Intelligence v4</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#faf9f7; --surface:#fff; --surface2:#f5f3ef;
    --border:#e8e3db; --border2:#d6cfc4;
    --accent:#b07240; --accent-soft:#f7ede0;
    --text:#1c1916; --text2:#4a4540; --muted:#9a9088;
    --up:#3a7d52; --up-soft:#eaf3ec;
    --down:#b84040; --down-soft:#faeaea;
    --gold:#c9973a;
    --shadow:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.5;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
  .logo-en{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--accent);}
  .logo-by{font-size:11px;color:var(--muted);margin-left:10px;}
  .live-badge{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--up);background:var(--up-soft);padding:3px 9px;border-radius:20px;}
  .live-dot{width:5px;height:5px;border-radius:50%;background:var(--up);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .date-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .date-bar-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;}
  .date-inputs{display:flex;align-items:center;gap:8px;}
  .date-input{border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s;cursor:pointer;}
  .date-input:focus{border-color:var(--accent);}
  .date-sep{font-size:12px;color:var(--muted);}
  .date-apply-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
  .date-apply-btn:hover{opacity:.85;}
  .date-note{font-size:11px;color:var(--muted);font-style:italic;}
  .price-rt-badge{margin-left:auto;font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:3px 10px;border-radius:20px;white-space:nowrap;}
  .cat-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;overflow-x:auto;}
  .cat-tab{padding:11px 16px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .18s;}
  .cat-tab:hover{color:var(--text);}
  .cat-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
  .kpi-strip{background:var(--accent);padding:9px 28px;display:flex;gap:28px;overflow-x:auto;}
  .kpi-item{display:flex;align-items:center;gap:7px;white-space:nowrap;flex-shrink:0;}
  .kpi-label{font-size:11px;color:rgba(255,255,255,.7);}
  .kpi-val{font-size:13px;font-weight:700;color:#fff;}
  .kpi-div{width:1px;height:14px;background:rgba(255,255,255,.25);flex-shrink:0;}
  .page{padding:20px 28px;display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:1280px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);animation:fadeUp .35s ease both;}
  .card:nth-child(1){animation-delay:.04s}.card:nth-child(2){animation-delay:.08s}
  .card:nth-child(3){animation-delay:.12s}.card:nth-child(4){animation-delay:.16s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .card-head{padding:13px 18px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .card-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .date-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;}
  .date-badge.sample{background:var(--surface2);color:var(--muted);border:1px solid var(--border2);}
  .date-badge.live{background:var(--accent-soft);color:var(--accent);}
  .date-badge.realtime{background:var(--up-soft);color:var(--up);}
  .card-hint{font-size:11px;color:var(--muted);font-style:italic;}
  .card-body{padding:14px 18px;}
  .card-body-flush{padding:0;}
  .loading-wrap{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--muted);font-size:13px;}
  .spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .rank-list{display:flex;flex-direction:column;}
  .rank-row{display:flex;align-items:center;gap:11px;padding:9px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
  .rank-row:last-child{border-bottom:none;}
  .rank-row:hover{background:var(--surface2);}
  .rank-row.active{background:var(--accent-soft);}
  .rk-no{font-family:'Cormorant Garamond',serif;font-size:17px;width:20px;text-align:center;color:var(--border2);flex-shrink:0;font-weight:600;}
  .rk-no.gold{color:var(--gold);}.rk-no.silver{color:#909090;}.rk-no.bronze{color:#a07050;}
  .rk-info{flex:1;min-width:0;}
  .rk-brand{font-size:10px;color:var(--muted);margin-bottom:1px;display:flex;align-items:center;gap:5px;}
  .rk-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rk-right{text-align:right;flex-shrink:0;}
  .rk-price{font-size:13px;font-weight:700;}
  .rk-unit{font-size:10px;color:var(--muted);margin-top:1px;}
  .badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;}
  .b-hot{background:#fff0e0;color:var(--accent);}.b-new{background:#e8f0fe;color:#3a6fd8;}.b-up{background:var(--up-soft);color:var(--up);}
  .kw-list{display:flex;flex-direction:column;gap:5px;}
  .kw-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;transition:background .15s;}
  .kw-row:hover{background:var(--surface2);}
  .kw-no{font-size:11px;font-weight:700;width:16px;text-align:center;color:var(--muted);}
  .kw-no.hot{color:var(--accent);}
  .kw-word{flex:1;font-size:13px;font-weight:500;}
  .kw-bar-wrap{width:60px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
  .kw-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#d4956a);border-radius:2px;}
  .kw-pct{font-size:11px;font-weight:700;width:50px;text-align:right;}
  .c-up{color:var(--up);}.c-dn{color:var(--down);}.c-flat{color:var(--muted);}
  .rv-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 20px;gap:8px;color:var(--muted);font-size:13px;text-align:center;}
  .rv-empty-icon{font-size:28px;opacity:.5;}
  .rv-product{font-size:12px;font-weight:700;color:var(--accent);padding-bottom:10px;margin-bottom:12px;border-bottom:1px solid var(--border);}
  .sentiment-bar{display:flex;height:5px;border-radius:4px;overflow:hidden;margin-bottom:8px;}
  .sb-pos{background:var(--up);}.sb-neg{background:var(--down);}.sb-neu{background:var(--border2);}
  .sentiment-legend{display:flex;gap:14px;margin-bottom:14px;}
  .sl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
  .sl-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .rv-cards{display:flex;flex-direction:column;gap:8px;}
  .rv-card{padding:10px 12px;border-radius:7px;border-left:3px solid var(--border2);background:var(--surface2);}
  .rv-card.pos{border-left-color:var(--up);}.rv-card.neg{border-left-color:var(--down);}
  .rv-tag{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px;}
  .rv-card.pos .rv-tag{color:var(--up);}.rv-card.neg .rv-tag{color:var(--down);}.rv-card .rv-tag{color:var(--muted);}
  .rv-text{font-size:12px;line-height:1.65;color:var(--text2);}
  .rv-n{font-size:10px;color:var(--muted);margin-top:4px;}
  .ptable-scroll{overflow-x:auto;}
  table.ptable{width:100%;border-collapse:collapse;}
  .ptable thead th{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:10px 14px;border-bottom:2px solid var(--border);text-align:left;white-space:nowrap;background:var(--surface2);}
  .ptable tbody td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
  .ptable tbody tr:last-child td{border-bottom:none;}
  .ptable tbody tr:hover td{background:var(--surface2);}
  .pd-name{font-weight:600;font-size:13px;}.pd-sub{font-size:10px;color:var(--muted);margin-top:2px;}
  .p-best{font-weight:700;color:var(--up);}.p-mid{font-weight:500;}.p-high{color:var(--muted);}
  .unit-chip{display:inline-block;background:var(--accent-soft);color:var(--accent);border:1px solid #e8c89a;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700;}
  .gap-chip{font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;}
  .gap-dn{background:var(--down-soft);color:var(--down);}.gap-up{background:var(--up-soft);color:var(--up);}
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>
<header>
  <div><span class="logo-en">Beauty MD Intelligence</span><span class="logo-by">by 조병근</span></div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
</header>
<div class="date-bar">
  <span class="date-bar-label">📅 조회 기간</span>
  <div class="date-inputs">
    <input type="date" class="date-input" id="startDate">
    <span class="date-sep">~</span>
    <input type="date" class="date-input" id="endDate">
  </div>
  <button class="date-apply-btn" onclick="applyDate()">조회</button>
  <span class="date-note">※ 키워드·랭킹에 적용 | 가격은 실시간</span>
  <div class="price-rt-badge">💰 가격 비교 — 실시간 기준</div>
</div>
<nav class="cat-nav">
  <div class="cat-tab active" onclick="switchCat(this,'skincare')">🌿 스킨케어</div>
  <div class="cat-tab" onclick="switchCat(this,'mask')">🧖 마스크팩</div>
  <div class="cat-tab" onclick="switchCat(this,'suncare')">☀️ 선케어</div>
  <div class="cat-tab" onclick="switchCat(this,'cleansing')">🧴 클렌징</div>
  <div class="cat-tab" onclick="switchCat(this,'makeup')">💄 메이크업</div>
</nav>
<div class="kpi-strip">
  <div class="kpi-item"><span class="kpi-label">모니터링 상품</span><span class="kpi-val">247개</span></div>
  <div class="kpi-div"></div>
  <div class="kpi-item"><span class="kpi-label">급등 키워드</span><span class="kpi-val" id="kpiHot">—</span></div>
  <div class="kpi-div"></div>
  <div class="kpi-item"><span class="kpi-label">올리브영 vs 네이버 최저가</span><span class="kpi-val">평균 -21%</span></div>
  <div class="kpi-div"></div>
  <div class="kpi-item"><span class="kpi-label">조회 기간</span><span class="kpi-val" id="kpiPeriod">샘플 데이터</span></div>
</div>
<div class="page">
  <div class="card">
    <div class="card-head">
      <div class="card-title">🏆 올리브영 TOP 10</div>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="date-badge sample" id="rankDateLabel">샘플 데이터</span>
        <span class="card-hint">클릭 → 리뷰</span>
      </div>
    </div>
    <div class="card-body-flush"><div class="rank-list" id="rankList"></div></div>
  </div>
  <div class="card">
    <div class="card-head"><div class="card-title">💬 AI 리뷰 인사이트</div></div>
    <div class="card-body" id="reviewPanel">
      <div class="rv-empty"><div class="rv-empty-icon">👈</div>랭킹에서 상품을 클릭하면<br>AI 리뷰 분석이 표시돼요</div>
    </div>
  </div>
  <div class="card">
    <div class="card-head">
      <div class="card-title">📈 네이버 트렌드 키워드</div>
      <span class="date-badge sample" id="kwDateLabel">샘플 데이터</span>
    </div>
    <div class="card-body" id="kwPanel"></div>
  </div>
  <div class="card">
    <div class="card-head">
      <div class="card-title">💰 채널별 가격 비교 · 단위가격</div>
      <span class="date-badge realtime">실시간</span>
    </div>
    <div class="card-body-flush"><div class="ptable-scroll"><table class="ptable" id="priceTable"></table></div></div>
  </div>
</div>
<script>
const WORKER_URL="https://beauty-md-dashboard.byungkuen.workers.dev";
let currentCat='skincare',currentStart='',currentEnd='',isLive=false;
function initDates(){const today=new Date(),prior=new Date();prior.setDate(today.getDate()-28);const fmt=d=>d.toISOString().split('T')[0];document.getElementById('startDate').value=fmt(prior);document.getElementById('endDate').value=fmt(today);document.getElementById('endDate').max=document.getElementById('startDate').max=fmt(today);}
function setDateBadge(id,start,end){const el=document.getElementById(id);if(start&&end){el.textContent=`${start} ~ ${end}`;el.className='date-badge live';}else{el.textContent='샘플 데이터';el.className='date-badge sample';}}
async function applyDate(){const s=document.getElementById('startDate').value,e=document.getElementById('endDate').value;if(!s||!e){alert('날짜를 모두 선택해주세요.');return;}if(s>e){alert('시작일이 종료일보다 늦을 수 없어요.');return;}currentStart=s;currentEnd=e;isLive=true;setDateBadge('rankDateLabel',s,e);setDateBadge('kwDateLabel',s,e);document.getElementById('kpiPeriod').textContent=`${s} ~ ${e}`;renderRanking(DATA[currentCat].ranking);await loadKeywords();}
async function loadKeywords(){const panel=document.getElementById('kwPanel');panel.innerHTML='<div class="loading-wrap"><div class="spinner"></div>키워드 불러오는 중...</div>';try{const res=await fetch(`${WORKER_URL}/?category=${currentCat}&startDate=${currentStart}&endDate=${currentEnd}&timeUnit=week`);const data=await res.json();if(data.error){panel.innerHTML=`<div style="color:var(--down);padding:20px;font-size:12px">⚠️ ${data.error}</div>`;return;}renderKeywords(data.keywords);const cnt=data.keywords.filter(k=>k.dir==='up').length;document.getElementById('kpiHot').textContent=`${cnt}개 ▲`;}catch(e){panel.innerHTML=`<div style="color:var(--down);padding:20px;font-size:12px">⚠️ 연결 오류: ${e.message}</div>`;}}
function renderKeywords(kws){if(!kws||!kws.length){document.getElementById('kwPanel').innerHTML='<div style="color:var(--muted);padding:20px;text-align:center">데이터 없음</div>';return;}const maxR=Math.max(...kws.map(k=>k.ratio));document.getElementById('kwPanel').innerHTML='<div class="kw-list">'+kws.map((k,i)=>{const barW=maxR>0?Math.round(k.ratio/maxR*100):0;const pctStr=k.dir==='up'?`▲${k.pct}%`:k.dir==='dn'?`▼${Math.abs(k.pct)}%`:'→ 0%';const pctCls=k.dir==='up'?'c-up':k.dir==='dn'?'c-dn':'c-flat';return`<div class="kw-row"><span class="kw-no ${i<3?'hot':''}">${i+1}</span><span class="kw-word">${k.word}</span><div class="kw-bar-wrap"><div class="kw-bar-fill" style="width:${barW}%"></div></div><span class="kw-pct ${pctCls}">${pctStr}</span></div>`;}).join('')+'</div>';}
function switchCat(el,cat){document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');currentCat=cat;renderPrices(DATA[cat].prices);renderRanking(DATA[cat].ranking);document.getElementById('reviewPanel').innerHTML='<div class="rv-empty"><div class="rv-empty-icon">👈</div>랭킹에서 상품을 클릭하면<br>AI 리뷰 분석이 표시돼요</div>';if(isLive){setDateBadge('rankDateLabel',currentStart,currentEnd);setDateBadge('kwDateLabel',currentStart,currentEnd);loadKeywords();}else{setDateBadge('rankDateLabel','','');setDateBadge('kwDateLabel','','');document.getElementById('kpiPeriod').textContent='샘플 데이터';renderKeywords(DATA[cat].sampleKeywords);}}
function renderRanking(items){const medals=['gold','silver','bronze'];const bm={hot:'<span class="badge b-hot">🔥 HOT</span>',new:'<span class="badge b-new">✨ NEW</span>',up:'<span class="badge b-up">▲ UP</span>'};document.getElementById('rankList').innerHTML=items.map((p,i)=>`<div class="rank-row" onclick="showReview(${i})" id="row-${i}"><div class="rk-no ${medals[i]||''}">${i+1}</div><div class="rk-info"><div class="rk-brand">${p.brand} ${bm[p.badge]||''}</div><div class="rk-name">${p.name}</div></div><div class="rk-right"><div class="rk-price">${p.price}</div><div class="rk-unit">${p.unit}</div></div></div>`).join('');}
function showReview(idx){const p=DATA[currentCat].ranking[idx];document.querySelectorAll('.rank-row').forEach(r=>r.classList.remove('active'));document.getElementById('row-'+idx).classList.add('active');document.getElementById('reviewPanel').innerHTML=`<div class="rv-product">📦 ${p.brand} · ${p.name}</div><div class="sentiment-bar"><div class="sb-pos" style="width:${p.pos}%"></div><div class="sb-neg" style="width:${p.neg}%"></div><div class="sb-neu" style="width:${p.neu}%"></div></div><div class="sentiment-legend"><div class="sl-item"><div class="sl-dot" style="background:var(--up)"></div>긍정 ${p.pos}%</div><div class="sl-item"><div class="sl-dot" style="background:var(--down)"></div>부정 ${p.neg}%</div><div class="sl-item"><div class="sl-dot" style="background:var(--border2)"></div>중립 ${p.neu}%</div></div><div class="rv-cards"><div class="rv-card pos"><div class="rv-tag">✅ 긍정</div><div class="rv-text">${p.posText}</div><div class="rv-n">${p.total.toLocaleString()}건 중 ${p.posN.toLocaleString()}건</div></div><div class="rv-card neg"><div class="rv-tag">❌ 부정</div><div class="rv-text">${p.negText}</div><div class="rv-n">${p.negN.toLocaleString()}건</div></div><div class="rv-card"><div class="rv-tag">➡️ 중립</div><div class="rv-text">${p.neuText}</div><div class="rv-n">${p.neuN.toLocaleString()}건</div></div></div>`;}
function renderPrices(prices){document.getElementById('priceTable').innerHTML=`<thead><tr><th>상품</th><th>올리브영</th><th>쿠팡</th><th>네이버 최저가</th><th>단위가격</th><th>OLY vs 최저가</th></tr></thead><tbody>${prices.map(p=>{const nums=[p.oly,p.coup,p.naver].map(v=>parseInt(v.replace(/,/g,'')));const min=Math.min(...nums);const cls=v=>parseInt(v.replace(/,/g,''))===min?'p-best':parseInt(v.replace(/,/g,''))>min*1.05?'p-high':'p-mid';return`<tr><td><div class="pd-name">${p.name}</div><div class="pd-sub">${p.sub}</div></td><td><span class="${cls(p.oly)}">${p.oly}</span></td><td><span class="${cls(p.coup)}">${p.coup}</span></td><td><span class="${cls(p.naver)}">${p.naver}</span></td><td><span class="unit-chip">${p.unit}</span></td><td><span class="gap-chip gap-${p.gapDir}">${p.gap}</span></td></tr>`;}).join('')}</tbody>`;}
